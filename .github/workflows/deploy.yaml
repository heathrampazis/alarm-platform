name: Deploy
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Deploy Helm
      run: |
        helm upgrade alarm ./charts/alarm \
        -n alarm-system \
        --set backend.image.tag=${{ inputs.backend_sha }} \
        --set frontend.image.tag=${{ inputs.frontend_sha }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alarm-backend
  namespace: alarm-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alarm-backend
  template:
    metadata:
      labels:
        app: alarm-backend
    spec:
      containers:
        - name: backend
          image: alarm-backend
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: alarm-backend-service
  namespace: alarm-system
spec:
  type: ClusterIP
  selector:
    app: alarm-backend
  ports:
    - port: 8080
      targetPort: 8080